services:
  lifequest-frontend-dev:
    image: node:20-alpine
    container_name: lifequest-frontend-dev
    working_dir: /app
    command: >
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ];
      then if [ -f package-lock.json ]; then npm ci; else npm install; fi; fi &&
      npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    restart: unless-stopped
    volumes:
      - .:/app
      - lifequest-frontend-node_modules:/app/node_modules

volumes:
  lifequest-frontend-node_modules:
