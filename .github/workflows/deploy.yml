name: Deploy LifeQuest

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lifequest-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      DEPLOY_BASE: /var/www/lifequest
      RELEASE_ID: ${{ github.run_id }}-${{ github.sha }}
      ARCHIVE_NAME: lifequest-release-${{ github.run_id }}-${{ github.sha }}.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package release
        run: tar -czf "$ARCHIVE_NAME" -C dist .

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release archive
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: scp "$ARCHIVE_NAME" "$VPS_USER@$VPS_HOST:/tmp/$ARCHIVE_NAME"

      - name: Activate release on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_BASE: ${{ env.DEPLOY_BASE }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
          ARCHIVE_NAME: ${{ env.ARCHIVE_NAME }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" \
            "export DEPLOY_BASE='$DEPLOY_BASE' RELEASE_ID='$RELEASE_ID' ARCHIVE_PATH='/tmp/$ARCHIVE_NAME'; bash -s" \
            < scripts/deploy-frontend.sh
