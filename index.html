<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lifequest-icon.svg" />
    <link rel="apple-touch-icon" href="/lifequest-icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0B1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="LifeQuest — mobile-first персональная операционная система жизни для спокойного планирования, восстановления и видимого роста."
    />
    <title>LifeQuest</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0b1020;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% -8%, rgba(99, 102, 241, 0.22), transparent 28%),
          radial-gradient(circle at 88% 16%, rgba(34, 211, 238, 0.13), transparent 24%),
          linear-gradient(180deg, #030817 0%, #08101f 42%, #050915 100%);
      }

      .boot-shell {
        box-sizing: border-box;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
        color: #e5eef8;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      .boot-card {
        width: min(100%, 26rem);
        border: 1px solid rgba(34, 211, 238, 0.16);
        border-radius: 24px;
        background: rgba(8, 16, 31, 0.84);
        box-shadow: 0 24px 70px rgba(2, 6, 23, 0.62);
        padding: 24px 20px;
        text-align: center;
      }

      .boot-core {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border-radius: 999px;
        border: 1px solid rgba(34, 211, 238, 0.28);
        background:
          radial-gradient(circle at 35% 30%, #e5eef8 0%, #22d3ee 18%, #6366f1 52%, rgba(11, 16, 32, 0.92) 100%);
        box-shadow: 0 0 34px rgba(34, 211, 238, 0.26);
        animation: bootPulse 2.4s ease-in-out infinite;
      }

      .boot-kicker {
        margin: 0;
        color: rgba(34, 211, 238, 0.82);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .boot-title {
        margin: 8px 0 0;
        font-size: 22px;
        line-height: 1.2;
        font-weight: 700;
      }

      .boot-copy {
        margin: 10px auto 0;
        max-width: 17rem;
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.6;
      }

      @keyframes bootPulse {
        0%,
        100% {
          transform: scale(0.98);
          opacity: 0.86;
        }

        50% {
          transform: scale(1.03);
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-core {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell" aria-label="LifeQuest запускается">
        <div class="boot-card">
          <div class="boot-core" aria-hidden="true"></div>
          <p class="boot-kicker">LifeQuest</p>
          <h1 class="boot-title">Идёт запуск локальной системы</h1>
          <p class="boot-copy">Собираю базу. Companion Core активируется.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
